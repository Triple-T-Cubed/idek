<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>helper</title></head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ---- YOUR TWO SUPABASE VALUES GO HERE (same ones as before) ----
  const SUPABASE_URL = "https://ryyefzglnwtspeyduavp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_AwtwXMk84j3R7VUIdh4Kpw_ay9EPmsy";
  // ------------------------------------------------------------------

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function toFakeEmail(username) {
    return username.toLowerCase() + "@users.mysite.local";
  }

  // Safely converts incoming base64 strings back to a binary Blob for Supabase Storage
  function processIncomingFile(fileData, defaultName = "image.png") {
    if (!fileData) return null;

    if (typeof fileData === "string" && fileData.startsWith("data:")) {
      const parts = fileData.split(",");
      const mimeMatch = parts[0].match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : "image/png";
      const ext = mime.split("/")[1] || "png";

      const bstr = atob(parts[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }

      return {
        blob: new Blob([u8arr], { type: mime }),
        ext: ext
      };
    }

    // Fallback if a standard File object manages to pass through cleanly
    return {
      blob: fileData,
      ext: fileData.name ? fileData.name.split(".").pop() : "png"
    };
  }

  window.addEventListener("message", async (event) => {
    const msg = event.data;
    if (!msg || !msg.type) return;

    if (msg.type === "auth-submit") {
      const { username, password } = msg;
      const email = toFakeEmail(username);

      const { data: signUpData, error: signUpError } = await client.auth.signUp({
        email,
        password,
        options: { data: { username } },
      });

      if (!signUpError) {
        const uid = signUpData.user?.id;
        if (uid) {
          await client.from("profiles").upsert({ id: uid, username });
        }
        parent.postMessage({ type: "auth-result", success: true, username }, "*");
        return;
      }

      const errMsg = signUpError.message.toLowerCase();
      const accountExists =
        errMsg.includes("already registered") ||
        errMsg.includes("already exists") ||
        errMsg.includes("already been registered");

      if (accountExists) {
        const { data: signInData, error: signInError } = await client.auth.signInWithPassword({ email, password });
        if (signInError) {
          parent.postMessage({ type: "auth-result", success: false, error: "Incorrect password." }, "*");
          return;
        }
        const uid = signInData.user?.id;
        if (uid) {
          await client.from("profiles").upsert({ id: uid, username });
        }
        parent.postMessage({ type: "auth-result", success: true, username }, "*");
        return;
      }

      parent.postMessage({ type: "auth-result", success: false, error: signUpError.message }, "*");
    }

    if (msg.type === "update-profile") {
      const { aboutMe, photoFile } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "profile-result", success: false, error: "Not logged in." }, "*");
        return;
      }

      let avatarUrl = userData.user.user_metadata.avatar_url || null;

      const fileObj = processIncomingFile(photoFile, "avatar.png");
      if (fileObj) {
        const filePath = `${userData.user.id}/avatar.${fileObj.ext}`;

        const { error: uploadError } = await client.storage
          .from("avatars")
          .upload(filePath, fileObj.blob, { upsert: true, contentType: fileObj.blob.type });

        if (uploadError) {
          parent.postMessage({ type: "profile-result", success: false, error: uploadError.message }, "*");
          return;
        }

        const { data: publicUrlData } = client.storage.from("avatars").getPublicUrl(filePath);
        avatarUrl = publicUrlData.publicUrl + "?t=" + Date.now();
      }

      const { error: updateError } = await client.auth.updateUser({
        data: { about_me: aboutMe, avatar_url: avatarUrl },
      });

      if (updateError) {
        parent.postMessage({ type: "profile-result", success: false, error: updateError.message }, "*");
        return;
      }

      await client.from("profiles").upsert({
        id: userData.user.id,
        username: userData.user.user_metadata.username,
        about_me: aboutMe,
        avatar_url: avatarUrl,
      });

      parent.postMessage({ type: "profile-result", success: true, aboutMe, avatarUrl }, "*");
    }

    if (msg.type === "get-profile") {
      const { data } = await client.auth.getUser();
      if (!data.user) {
        parent.postMessage({ type: "profile-data", loggedIn: false }, "*");
        return;
      }

      const { data: themeRow } = await client
        .from("profiles")
        .select("theme_bg, theme_font, theme_card")
        .eq("id", data.user.id)
        .maybeSingle();

      parent.postMessage(
        {
          type: "profile-data",
          loggedIn: true,
          username: data.user.user_metadata.username,
          aboutMe: data.user.user_metadata.about_me || "",
          avatarUrl: data.user.user_metadata.avatar_url || "",
          themeBg: themeRow?.theme_bg || null,
          themeFont: themeRow?.theme_font || null,
          themeCard: themeRow?.theme_card || null,
        },
        "*"
      );
    }

    if (msg.type === "update-theme") {
      const { themeBg, themeFont, themeCard } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "update-theme-result", success: false, error: "Not logged in." }, "*");
        return;
      }
      
      const { error } = await client
        .from("profiles")
        .update({
          theme_bg: themeBg || null,
          theme_font: themeFont || null,
          theme_card: themeCard || null,
        })
        .eq("id", userData.user.id);

      parent.postMessage({ type: "update-theme-result", success: !error, error: error?.message }, "*");
    }

    if (msg.type === "list-profiles") {
      const { data: profiles, error } = await client
        .from("profiles")
        .select("id, username, avatar_url")
        .order("username", { ascending: true });

      parent.postMessage({ type: "profiles-list", profiles: profiles || [], error: error?.message }, "*");
    }

    if (msg.type === "get-profile-by-username") {
      const { username } = msg;
      const { data: profile, error } = await client
        .from("profiles")
        .select("id, username, about_me, avatar_url, theme_bg, theme_font, theme_card")
        .eq("username", username)
        .maybeSingle();

      if (error || !profile) {
        parent.postMessage({ type: "profile-by-username-result", found: false, error: error?.message }, "*");
        return;
      }

      parent.postMessage(
        {
          type: "profile-by-username-result",
          found: true,
          id: profile.id,
          username: profile.username,
          aboutMe: profile.about_me || "",
          avatarUrl: profile.avatar_url || "",
          themeBg: profile.theme_bg || null,
          themeFont: profile.theme_font || null,
          themeCard: profile.theme_card || null,
        },
        "*"
      );
    }

    if (msg.type === "get-board-items") {
      let targetUserId = msg.userId;

      if (!targetUserId) {
        const { data: userData } = await client.auth.getUser();
        if (!userData.user) {
          parent.postMessage({ type: "board-items", items: [] }, "*");
          return;
        }
        targetUserId = userData.user.id;
      }

      const { data: items, error } = await client
        .from("board_items")
        .select("*")
        .eq("user_id", targetUserId)
        .order("created_at", { ascending: true });

      parent.postMessage({ type: "board-items", items: items || [], error: error?.message }, "*");
    }

    if (msg.type === "add-board-item") {
      const { itemType, content, photoFile, x, y, width, height, rotation } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "board-add-result", success: false, error: "Not logged in." }, "*");
        return;
      }

      let imageUrl = null;
      const fileObj = processIncomingFile(photoFile, "board.png");
      if (itemType === "photo" && fileObj) {
        const filePath = `${userData.user.id}/${Date.now()}.${fileObj.ext}`;
        const { error: uploadError } = await client.storage
          .from("board-images")
          .upload(filePath, fileObj.blob, { contentType: fileObj.blob.type });
        if (uploadError) {
          parent.postMessage({ type: "board-add-result", success: false, error: uploadError.message }, "*");
          return;
        }
        const { data: publicUrlData } = client.storage.from("board-images").getPublicUrl(filePath);
        imageUrl = publicUrlData.publicUrl;
      }

      const { data: inserted, error: insertError } = await client
        .from("board_items")
        .insert({
          user_id: userData.user.id,
          type: itemType,
          content: content || null,
          image_url: imageUrl,
          x, y, width, height, rotation,
        })
        .select()
        .single();

      if (insertError) {
        parent.postMessage({ type: "board-add-result", success: false, error: insertError.message }, "*");
        return;
      }

      parent.postMessage({ type: "board-add-result", success: true, item: inserted }, "*");
    }

    if (msg.type === "update-board-item") {
      const { id, type: _messageType, ...fields } = msg;
      const { error } = await client.from("board_items").update(fields).eq("id", id);
      parent.postMessage({ type: "board-update-result", success: !error, error: error?.message }, "*");
    }

    if (msg.type === "delete-board-item") {
      const { id } = msg;
      const { error } = await client.from("board_items").delete().eq("id", id);
      parent.postMessage({ type: "board-delete-result", success: !error, id }, "*");
    }

    if (msg.type === "check-session") {
      const { data } = await client.auth.getUser();
      if (data.user) {
        await client.from("profiles").upsert({
          id: data.user.id,
          username: data.user.user_metadata.username,
          about_me: data.user.user_metadata.about_me || null,
          avatar_url: data.user.user_metadata.avatar_url || null,
        });
        parent.postMessage(
          {
            type: "session-result",
            loggedIn: true,
            username: data.user.user_metadata.username,
            userId: data.user.id,
          },
          "*"
        );
      } else {
        parent.postMessage({ type: "session-result", loggedIn: false }, "*");
      }
    }

    // ---------- Friends ----------

    if (msg.type === "send-friend-request") {
      const { targetUserId } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "friend-request-result", success: false, error: "Not logged in." }, "*");
        return;
      }
      const me = userData.user.id;

      const { data: existing } = await client
        .from("friendships")
        .select("*")
        .or(`and(requester_id.eq.${me},addressee_id.eq.${targetUserId}),and(requester_id.eq.${targetUserId},addressee_id.eq.${me})`)
        .maybeSingle();

      if (existing) {
        parent.postMessage({ type: "friend-request-result", success: false, error: "Already friends or request pending." }, "*");
        return;
      }

      const { error } = await client.from("friendships").insert({
        requester_id: me,
        addressee_id: targetUserId,
        status: "pending",
      });

      parent.postMessage({ type: "friend-request-result", success: !error, error: error?.message }, "*");
    }

    if (msg.type === "respond-friend-request") {
      const { requestId, accept } = msg;
      if (accept) {
        const { error } = await client.from("friendships").update({ status: "accepted" }).eq("id", requestId);
        parent.postMessage({ type: "friend-response-result", success: !error, error: error?.message }, "*");
      } else {
        const { error } = await client.from("friendships").delete().eq("id", requestId);
        parent.postMessage({ type: "friend-response-result", success: !error, error: error?.message }, "*");
      }
    }

    if (msg.type === "get-my-friendships") {
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "my-friendships", friendships: [] }, "*");
        return;
      }
      const me = userData.user.id;
      const { data, error } = await client
        .from("friendships")
        .select("*")
        .or(`requester_id.eq.${me},addressee_id.eq.${me}`);
      parent.postMessage({ type: "my-friendships", friendships: data || [], error: error?.message }, "*");
    }

    if (msg.type === "get-friends-of-user") {
      const { userId } = msg;
      const { data, error } = await client
        .from("friendships")
        .select("*")
        .or(`requester_id.eq.${userId},addressee_id.eq.${userId}`)
        .eq("status", "accepted");

      if (error || !data || data.length === 0) {
        parent.postMessage({ type: "user-friends", userId, friends: [], error: error?.message }, "*");
        return;
      }

      const friendIds = data.map((f) => (f.requester_id === userId ? f.addressee_id : f.requester_id));
      const { data: profiles } = await client
        .from("profiles")
        .select("id, username, avatar_url")
        .in("id", friendIds);

      parent.postMessage({ type: "user-friends", userId, friends: profiles || [] }, "*");
    }

    if (msg.type === "get-incoming-requests") {
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "incoming-requests", requests: [] }, "*");
        return;
      }
      const me = userData.user.id;
      const { data, error } = await client
        .from("friendships")
        .select("*")
        .eq("addressee_id", me)
        .eq("status", "pending");

      if (error || !data || data.length === 0) {
        parent.postMessage({ type: "incoming-requests", requests: [], error: error?.message }, "*");
        return;
      }

      const requesterIds = data.map((r) => r.requester_id);
      const { data: profiles } = await client
        .from("profiles")
        .select("id, username, avatar_url")
        .in("id", requesterIds);

      const requests = data.map((r) => {
        const p = (profiles || []).find((pr) => pr.id === r.requester_id);
        return { id: r.id, username: p?.username || "unknown", avatarUrl: p?.avatar_url || "" };
      });

      parent.postMessage({ type: "incoming-requests", requests }, "*");
    }

    // ---------- Posts (photos/videos) ----------

    if (msg.type === "add-post") {
      const { postType, caption, mediaFile, visibility } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "add-post-result", success: false, error: "Not logged in." }, "*");
        return;
      }

      const fileObj = processIncomingFile(mediaFile, postType === "video" ? "post.mp4" : "post.png");
      if (!fileObj) {
        parent.postMessage({ type: "add-post-result", success: false, error: "No file provided." }, "*");
        return;
      }

      const filePath = `${userData.user.id}/${Date.now()}.${fileObj.ext}`;
      const { error: uploadError } = await client.storage
        .from("post-media")
        .upload(filePath, fileObj.blob, { contentType: fileObj.blob.type });

      if (uploadError) {
        parent.postMessage({ type: "add-post-result", success: false, error: uploadError.message }, "*");
        return;
      }

      const { data: publicUrlData } = client.storage.from("post-media").getPublicUrl(filePath);

      const { data: inserted, error: insertError } = await client
        .from("posts")
        .insert({
          user_id: userData.user.id,
          type: postType,
          media_url: publicUrlData.publicUrl,
          caption: caption || null,
          visibility: visibility === "friends" ? "friends" : "public",
        })
        .select()
        .single();

      if (insertError) {
        parent.postMessage({ type: "add-post-result", success: false, error: insertError.message }, "*");
        return;
      }

      parent.postMessage({ type: "add-post-result", success: true, post: inserted }, "*");
    }

    if (msg.type === "get-posts-of-user") {
      const { userId } = msg;
      const { data, error } = await client
        .from("posts")
        .select("*")
        .eq("user_id", userId)
        .order("created_at", { ascending: false });

      parent.postMessage({ type: "user-posts", userId, posts: data || [], error: error?.message }, "*");
    }

    if (msg.type === "get-feed-posts") {
      const { data, error } = await client
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(30);

      if (error || !data || data.length === 0) {
        parent.postMessage({ type: "feed-posts", posts: [], error: error?.message }, "*");
        return;
      }

      const authorIds = [...new Set(data.map((p) => p.user_id))];
      const { data: profiles } = await client
        .from("profiles")
        .select("id, username, avatar_url")
        .in("id", authorIds);

      const profileMap = {};
      (profiles || []).forEach((p) => {
        profileMap[p.id] = p;
      });

      const posts = data.map((p) => ({
        ...p,
        author: profileMap[p.user_id] || { username: "unknown", avatar_url: null },
      }));

      parent.postMessage({ type: "feed-posts", posts }, "*");
    }

    if (msg.type === "delete-post") {
      const { id } = msg;
      const { error } = await client.from("posts").delete().eq("id", id);
      parent.postMessage({ type: "delete-post-result", success: !error, id, error: error?.message }, "*");
    }

    // ---------- Direct Messages (friends only — enforced by RLS) ----------

    if (msg.type === "send-message") {
      const { recipientId, content } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "message-send-result", success: false, error: "Not logged in." }, "*");
        return;
      }
      const trimmed = (content || "").trim();
      if (!trimmed) {
        parent.postMessage({ type: "message-send-result", success: false, error: "Empty message." }, "*");
        return;
      }

      const { data: inserted, error } = await client
        .from("messages")
        .insert({ sender_id: userData.user.id, recipient_id: recipientId, content: trimmed })
        .select()
        .single();

      parent.postMessage(
        { type: "message-send-result", success: !error, message: inserted, error: error?.message },
        "*"
      );
    }

    if (msg.type === "get-conversation") {
      const { otherUserId } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "conversation-result", otherUserId, messages: [] }, "*");
        return;
      }
      const me = userData.user.id;

      const { data, error } = await client
        .from("messages")
        .select("*")
        .or(`and(sender_id.eq.${me},recipient_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},recipient_id.eq.${me})`)
        .order("created_at", { ascending: true });

      parent.postMessage(
        { type: "conversation-result", otherUserId, messages: data || [], error: error?.message },
        "*"
      );
    }

    if (msg.type === "get-all-my-messages") {
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "all-messages-result", messages: [] }, "*");
        return;
      }
      const me = userData.user.id;

      const { data, error } = await client
        .from("messages")
        .select("*")
        .or(`sender_id.eq.${me},recipient_id.eq.${me}`)
        .order("created_at", { ascending: false });

      parent.postMessage(
        { type: "all-messages-result", messages: data || [], myId: me, error: error?.message },
        "*"
      );
    }

    if (msg.type === "mark-conversation-read") {
      const { otherUserId } = msg;
      const { data: userData } = await client.auth.getUser();
      if (!userData.user) {
        parent.postMessage({ type: "mark-read-result", success: false }, "*");
        return;
      }
      const me = userData.user.id;

      const { error } = await client
        .from("messages")
        .update({ read: true })
        .eq("sender_id", otherUserId)
        .eq("recipient_id", me)
        .eq("read", false);

      parent.postMessage({ type: "mark-read-result", success: !error, otherUserId, error: error?.message }, "*");
    }
  });

  parent.postMessage({ type: "helper-ready" }, "*");
</script>
</body>
</html>

  parent.postMessage({ type: "helper-ready" }, "*");
</script>
</body>
</html>
